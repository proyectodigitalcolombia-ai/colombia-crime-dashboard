kind = "mobile"
previewPath = "/safenode-mobile/"
title = "SafeNode Mobile"
version = "1.0.0"
id = "artifacts/safenode-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/safenode-mobile/" ]
localPort = 24714

[services.development]
run = "pnpm --filter @workspace/safenode-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/safenode-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/safenode-mobile", "run", "serve" ]

[services.env]
PORT = "24714"
BASE_PATH = "/safenode-mobile/"
