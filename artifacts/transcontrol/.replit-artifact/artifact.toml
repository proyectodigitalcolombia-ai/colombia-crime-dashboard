kind = "web"
previewPath = "/transcontrol/"
title = "TransControl — Plataforma de Transporte de Carga"
version = "1.0.0"
id = "artifacts/transcontrol"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/transcontrol/" ]
localPort = 20203

[services.development]
run = "pnpm --filter @workspace/transcontrol run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/transcontrol", "run", "build" ]
publicDir = "artifacts/transcontrol/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20203"
BASE_PATH = "/transcontrol/"
