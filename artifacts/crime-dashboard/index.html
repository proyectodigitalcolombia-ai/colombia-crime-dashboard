<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Dashboard Estadístico de Delitos Colombia</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{background:#070c15;color:#fff;font-family:Inter,sans-serif;min-height:100vh}
      #root{min-height:100vh}
      #app-loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
      #app-loader .spinner{width:40px;height:40px;border:3px solid #0c1220;border-top:3px solid #00d4ff;border-radius:50%;animation:spin 0.8s linear infinite}
      #app-loader p{color:#8892a4;font-size:14px}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loader">
        <div class="spinner"></div>
        <p>Cargando dashboard...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
