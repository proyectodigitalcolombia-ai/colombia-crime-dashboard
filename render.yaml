databases:
  - name: colombia-crime-db
    plan: free
    databaseName: colombia_crimes
    user: crime_admin

services:
  - type: web
    name: colombia-crime-api
    env: node
    plan: free
    buildCommand: npm install -g pnpm@9 && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: colombia-crime-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

  - type: web
    name: colombia-crime-dashboard
    env: static
    plan: free
    buildCommand: npm install -g pnpm@9 && pnpm install && BASE_PATH=/ pnpm --filter @workspace/crime-dashboard run build
    staticPublishPath: ./artifacts/crime-dashboard/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: VITE_API_URL
        sync: false
