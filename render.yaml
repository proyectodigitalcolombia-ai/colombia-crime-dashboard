databases:
  - name: colombia-crime-db
    plan: starter
    databaseName: colombia_crimes
    user: crime_admin

services:
  - type: web
    name: colombia-crime-api
    env: node
    plan: starter
    buildCommand: npm install -g pnpm@9 && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: colombia-crime-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

  - type: web
    name: colombia-crime-dashboard
    env: node
    plan: starter
    buildCommand: cd artifacts/crime-dashboard && npm install express
    startCommand: node artifacts/crime-dashboard/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
